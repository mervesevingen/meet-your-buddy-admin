<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f9fafb;
      margin: 0;
      padding: 40px;
      color: #111;
    }

    h1 {
      margin-bottom: 20px;
    }

    input, select {
      padding: 8px 12px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #ddd;
    }

    button {
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #4959ea;
      color: white;
      margin-right: 10px;
    }

    .danger {
      background: #dc2626;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border: 1px solid #e5e7eb;
      margin-top: 10px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #f3f4f6;
      font-weight: 600;
    }

    tr:hover {
      background: #f9fafb;
    }

    .section {
      margin-top: 40px;
    }

    .login {
      max-width: 300px;
      margin: 100px auto;
      text-align: center;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <!-- LOGIN -->
  <div id="loginView" class="login">
    <h2>Admin Login</h2>
    <input type="password" id="password" placeholder="Enter password" />
    <br><br>
    <button onclick="login()">Enter</button>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminView" class="hidden">

    <h1>Admin Panel</h1>

    <button class="danger" onclick="resetDraw()">Reset Draw</button>

    <br><br>

    <select id="teamFilter" onchange="loadData()">
      <option value="">All Teams</option>
    </select>

    <div class="section">
      <h3>Assignments</h3>
      <table>
        <thead>
          <tr>
            <th>Employee</th>
            <th>Candidate</th>
            <th>Team</th>
          </tr>
        </thead>
        <tbody id="assignedTable"></tbody>
      </table>
    </div>

    <div class="section">
      <h3>Unassigned Candidates</h3>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Team</th>
          </tr>
        </thead>
        <tbody id="unassignedTable"></tbody>
      </table>
    </div>

  </div>

  <script>
    const SUPABASE_URL = "https://rvftmucgupbwpberiwdq.supabase.co";
    const SUPABASE_KEY = "YOUR_KEY";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 🔐 LOGIN
    function login() {
      const pass = document.getElementById("password").value;

      if (pass === "123") {
        document.getElementById("loginView").style.display = "none";
        document.getElementById("adminView").style.display = "block";
        loadTeams();
        loadData();
      } else {
        alert("Wrong password");
      }
    }

    async function loadTeams() {
      const { data } = await client
        .from("candidates")
        .select("team");

      const teams = [...new Set(data.map(d => d.team))];

      const select = document.getElementById("teamFilter");

      teams.forEach(team => {
        const option = document.createElement("option");
        option.value = team;
        option.textContent = team;
        select.appendChild(option);
      });
    }

    async function loadData() {
      const team = document.getElementById("teamFilter").value;

      let query = client.from("candidates").select("*");

      if (team) {
        query = query.eq("team", team);
      }

      const { data } = await query;

      const assignedTable = document.getElementById("assignedTable");
      const unassignedTable = document.getElementById("unassignedTable");

      assignedTable.innerHTML = "";
      unassignedTable.innerHTML = "";

      data.forEach(row => {
        if (row.assigned_to) {
          assignedTable.innerHTML += `
            <tr>
              <td>${row.assigned_to}</td>
              <td>${row.name}</td>
              <td>${row.team}</td>
            </tr>
          `;
        } else {
          unassignedTable.innerHTML += `
            <tr>
              <td>${row.name}</td>
              <td>${row.team}</td>
            </tr>
          `;
        }
      });
    }

    // 🔄 RESET
    async function resetDraw() {
      const confirmReset = confirm("Are you sure you want to reset all assignments?");

      if (!confirmReset) return;

      const { error } = await client.rpc("reset_draw");

      if (error) {
        alert("Error: " + error.message);
        return;
      }

      alert("All assignments have been reset.");
      loadData();
    }
  </script>

</body>
</html>
